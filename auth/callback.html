<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in… | Sounds Care</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e9ecef;
      border-top-color: #2d6a4f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6c757d; }
    .error-icon { font-size: 40px; margin-bottom: 16px; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #2d6a4f;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h2>Signing you in…</h2>
    <p>Please wait while we set up your account.</p>
  </div>

  <script>
    const _supa = supabase.createClient(
      'https://phoahudvrcelfrykoeuo.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBob2FodWR2cmNlbGZyeWtvZXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDY0MTMsImV4cCI6MjA5NDQyMjQxM30.xBKbHIttK__d_jQFLavYyJQilUGUFISiWrh8-hgIA9Y'
    );

    function showError(msg) {
      document.getElementById('card').innerHTML = `
        <div class="error-icon">⚠️</div>
        <h2>Sign-in failed</h2>
        <p>${msg}</p>
        <a class="btn" href="/signup.html">Try again</a>
      `;
    }

    async function handleCallback() {
      // Supabase JS v2 automatically exchanges the code/token from the URL hash.
      // We just need to getSession() after it processes the hash.
      const { data: { session }, error } = await _supa.auth.getSession();

      if (error) {
        console.error('Session error:', error);
        showError('We could not complete your sign-in. Please try again.');
        return;
      }

      if (!session) {
        // No session yet — Supabase might still be processing the hash.
        // Wait a moment and retry once.
        await new Promise(r => setTimeout(r, 1500));
        const { data: retry } = await _supa.auth.getSession();
        if (!retry.session) {
          showError('Session expired or invalid. Please sign in again.');
          return;
        }
        return continueWithSession(retry.session);
      }

      continueWithSession(session);
    }

    async function continueWithSession(session) {
      const user = session.user;
      const meta = user.user_metadata || {};

      // Extract profile data from OAuth provider metadata
      const fullName  = meta.full_name || meta.name || '';
      const avatarUrl = meta.avatar_url || meta.picture || '';
      const email     = user.email || '';

      // Upsert into public.users
      // (The trigger handles this automatically, but we also do it here
      //  to capture avatar_url which the trigger doesn't set)
      try {
        // Check if users table has avatar_url column; if not this is a no-op
        const { error: upsertErr } = await _supa
          .from('users')
          .upsert({
            id:        user.id,
            email:     email,
            full_name: fullName,
            role:      'employee'
          }, { onConflict: 'id' });

        if (upsertErr) {
          console.warn('users upsert:', upsertErr.message);
        }

        // Also upsert into worker_profiles if this is a new user
        // (so they have a profile record ready to fill out)
        const { data: existing } = await _supa
          .from('worker_profiles')
          .select('id')
          .eq('email', email)
          .maybeSingle();

        if (!existing) {
          const nameParts = fullName.trim().split(' ');
          await _supa.from('worker_profiles').insert({
            first_name:       nameParts[0] || '',
            last_name:        nameParts.slice(1).join(' ') || '',
            email:            email,
            profile_photo_url: avatarUrl,
            verification_stage: 'unverified',
            is_listed:        false
          });
        }

      } catch (e) {
        console.warn('Profile setup warning (non-fatal):', e.message);
      }

      // ── Redirect based on role / profile completeness ─────────
      // Adjust these URLs to match your actual page paths
      const isNewUser = !meta.iss || (Date.now() - new Date(user.created_at).getTime() < 10000);

      if (isNewUser) {
        // Send new users to complete their profile / choose role
        window.location.href = '/onboarding.html';
      } else {
        // Returning users go to their dashboard
        window.location.href = '/dashboard.html';
      }
    }

    handleCallback();
  </script>
</body>
</html>
