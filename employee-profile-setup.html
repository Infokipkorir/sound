<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Your Profile — SoundsCare</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1B6B45;--green-dark:#114B30;--green-light:#EEF7F2;--green-mid:#C8E6D6;
  --accent:#E8A040;--accent-light:#FEF3E2;
  --border:#E5E7EB;--text:#111827;--text-mid:#374151;--text-muted:#6B7280;
  --surface:#FFFFFF;--bg:#F6F8F7;
  --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FECACA;
  --success:#10B981;--shadow:0 4px 28px rgba(17,75,48,.09),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 16px 50px rgba(17,75,48,.14);
  --radius:12px;--radius-sm:8px;--radius-lg:22px;
  --font:'DM Sans',system-ui,sans-serif;
  --serif:'Playfair Display',serif;
}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1rem;
  background:
    radial-gradient(circle at 12% 8%, rgba(27,107,69,.07), transparent 38%),
    radial-gradient(circle at 92% 92%, rgba(232,160,64,.08), transparent 42%),
    var(--bg);
}
.page-wrap{width:100%;max-width:600px}

@keyframes slideInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes checkmark{0%{transform:scale(0) rotate(-45deg);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1) rotate(0);opacity:1}}

.fade-in{animation:fadeIn .4s ease-out}
.slide-in{animation:slideInUp .5s cubic-bezier(.34,.1,.64,.1)}

/* BRAND */
.brand{text-align:center;margin-bottom:1.6rem;animation:fadeIn .6s ease-out}
.brand-logo{display:inline-flex;align-items:center;gap:10px;font-size:23px;font-weight:800;color:var(--text);letter-spacing:-.4px;text-decoration:none;font-family:var(--serif)}
.brand-logo img{width:42px;height:42px;border-radius:13px;object-fit:contain}
.brand-sub{font-size:13px;color:var(--text-muted);margin-top:5px;letter-spacing:.01em}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.1rem 2rem 1.9rem;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;animation:slideInUp .6s cubic-bezier(.34,.1,.64,.1)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--accent))}

/* PROGRESS BAR */
.progress-bar{display:flex;gap:8px;margin-bottom:2rem;animation:slideInUp .5s ease-out .1s both}
.step-dot{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--text-muted);transition:all .3s}
.step-dot.active{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(27,107,69,.25)}
.step-dot.completed{background:var(--success);color:#fff}

/* TITLE */
.step-title{font-size:23px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px;font-family:var(--serif);animation:slideInUp .5s ease-out .2s both}
.step-sub{font-size:13.5px;color:var(--text-muted);margin-bottom:1.5rem;line-height:1.5;animation:slideInUp .5s ease-out .3s both}

/* FORM */
.fg{margin-bottom:.95rem;animation:slideInUp .5s ease-out;animation-fill-mode:both}
.fg:nth-child(1){animation-delay:.4s}
.fg:nth-child(2){animation-delay:.45s}
.fg:nth-child(3){animation-delay:.5s}
.fg:nth-child(4){animation-delay:.55s}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:5px}
.iw{position:relative;display:flex;align-items:center}
.iw .ico{position:absolute;left:12px;color:var(--text-muted);pointer-events:none;display:flex;align-items:center;font-size:15px}
input[type=text],input[type=email],textarea,select{width:100%;padding:10.5px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.iw.has-ico input{padding-left:38px}
input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(27,107,69,.10)}
textarea{resize:vertical;min-height:100px;font-family:var(--font)}
select{cursor:pointer}

/* LOCATION BADGE */
.location-info{display:flex;align-items:center;gap:8px;background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--green-dark);margin-bottom:1rem;animation:slideInUp .5s ease-out .35s both}
.location-info i{font-size:16px;flex-shrink:0}
.location-info .spinner{width:14px;height:14px;border:2px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* PHOTO UPLOAD */
.photo-upload{display:flex;flex-direction:column;gap:1rem;animation:slideInUp .5s ease-out .5s both}
.photo-preview{width:100%;aspect-ratio:1;background:var(--bg);border:2px dashed var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.photo-preview:hover{border-color:var(--green);background:var(--green-light)}
.photo-preview img{width:100%;height:100%;object-fit:cover;display:none}
.photo-preview-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted)}
.photo-preview-placeholder i{font-size:32px}
.photo-upload input[type=file]{display:none}

/* ALERTS */
.alert{border-radius:var(--radius-sm);padding:11px 13px;font-size:13px;font-weight:500;margin-bottom:13px;display:none;align-items:flex-start;gap:8px;line-height:1.5;animation:slideInUp .3s ease-out}
.alert i{font-size:15px;flex-shrink:0;margin-top:1px}
.alert.show{display:flex}
.alert.error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.alert.success{background:var(--green-light);border:1px solid #86EFAC;color:var(--green-dark)}

/* BUTTONS */
.btn-group{display:flex;gap:12px;animation:slideInUp .5s ease-out .6s both}
.btn{flex:1;border:none;border-radius:var(--radius-sm);padding:12px 18px;font-size:14.5px;font-family:var(--font);font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-.1px}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 6px 16px rgba(27,107,69,.22)}
.btn-primary:hover:not(:disabled){background:var(--green-dark)}
.btn-primary:active:not(:disabled){transform:scale(.99)}
.btn-secondary{background:var(--surface);border:1.5px solid var(--border);color:var(--text);text-decoration:none}
.btn-secondary:hover{border-color:var(--green);background:var(--green-light)}
.btn-secondary:active{transform:scale(.99)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none;flex-shrink:0}

/* SKILLS TAGS */
.skills-section{animation:slideInUp .5s ease-out .55s both}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:1rem 0}
.skill-tag{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;background:var(--surface)}
.skill-tag:hover{border-color:var(--green);background:var(--green-light)}
.skill-tag input[type=checkbox]{accent-color:var(--green);cursor:pointer}
.skill-tag.selected{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}

/* FOOTER */
.footer-text{text-align:center;font-size:13px;color:var(--text-muted);margin-top:1rem;animation:slideInUp .5s ease-out .7s both}
</style>
</head>
<body>

<div class="page-wrap">

  <!-- BRAND -->
  <div class="brand">
    <a class="brand-logo" href="index.html">
      <img src="sound_logo.png" alt="SoundsCare Logo">
      SoundsCare
    </a>
    <div class="brand-sub">Complete Your Employee Profile</div>
  </div>

  <div class="card">

    <!-- PROGRESS BAR -->
    <div class="progress-bar">
      <div class="step-dot completed"><i class="bi bi-check-lg"></i></div>
      <div class="step-dot active">2</div>
      <div class="step-dot">3</div>
    </div>

    <!-- ALERTS -->
    <div class="alert error" id="alertError">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertErrorText"></span>
    </div>

    <div class="alert success" id="alertSuccess">
      <i class="bi bi-check-circle-fill"></i>
      <span id="alertSuccessText"></span>
    </div>

    <!-- LOCATION INFO -->
    <div class="location-info" id="locationInfo">
      <div class="spinner" id="locationSpinner" style="display:flex"></div>
      <i class="bi bi-geo-alt" id="locationIcon"></i>
      <span id="locationText">Verifying your location...</span>
    </div>

    <!-- FORM HEADER -->
    <h1 class="step-title">Profile Setup</h1>
    <p class="step-sub">Help us know more about you. This information helps employers find the right match for their needs.</p>

    <!-- PROFILE FORM -->
    <form id="profileForm" onsubmit="handleProfileSubmit(event)">

      <!-- PROFESSIONAL TITLE -->
      <div class="fg">
        <label for="title">Professional Title / Role</label>
        <div class="iw has-ico">
          <i class="ico bi bi-briefcase-fill"></i>
          <input type="text" id="title" name="title" placeholder="e.g., Domestic Worker, Nanny, Housekeeper" required>
        </div>
      </div>

      <!-- EXPERIENCE LEVEL -->
      <div class="fg">
        <label for="experience">Years of Experience</label>
        <select id="experience" name="experience" required style="animation-delay:.45s">
          <option value="">Select experience level</option>
          <option value="0-1">Less than 1 year</option>
          <option value="1-3">1-3 years</option>
          <option value="3-5">3-5 years</option>
          <option value="5-10">5-10 years</option>
          <option value="10+">10+ years</option>
        </select>
      </div>

      <!-- HOURLY RATE -->
      <div class="fg">
        <label for="hourlyRate">Expected Hourly Rate (KES)</label>
        <div class="iw has-ico">
          <i class="ico bi bi-currency-exchange"></i>
          <input type="text" id="hourlyRate" name="hourlyRate" placeholder="e.g., 350" required>
        </div>
      </div>

      <!-- ABOUT YOU -->
      <div class="fg">
        <label for="bio">About You</label>
        <textarea id="bio" name="bio" placeholder="Tell employers about your skills, experience, and what makes you special..." required></textarea>
      </div>

      <!-- SKILLS -->
      <div class="skills-section">
        <label style="display:block;font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:10px">Select Your Skills</label>
        <div class="skills-grid">
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="cleaning">
            <span>Cleaning</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="childcare">
            <span>Childcare</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="cooking">
            <span>Cooking</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="laundry">
            <span>Laundry</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="gardening">
            <span>Gardening</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="elderly-care">
            <span>Elderly Care</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="tutoring">
            <span>Tutoring</span>
          </label>
          <label class="skill-tag">
            <input type="checkbox" name="skills" value="security">
            <span>Security</span>
          </label>
        </div>
      </div>

      <!-- PHOTO UPLOAD -->
      <div class="photo-upload">
        <label style="display:block;font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:8px">Profile Photo</label>
        <div class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()">
          <div class="photo-preview-placeholder">
            <i class="bi bi-camera-fill"></i>
            <span>Click to upload photo</span>
            <span style="font-size:11px;color:var(--text-muted)">JPG, PNG - Max 5MB</span>
          </div>
          <img id="previewImg" src="" alt="Preview">
        </div>
        <input type="file" id="photoInput" name="photo" accept="image/jpeg,image/png" onchange="handlePhotoUpload(event)">
      </div>

      <!-- ACTION BUTTONS -->
      <div class="btn-group">
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Back</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span id="submitBtnText">Continue</span>
          <div class="spinner" id="submitSpinner"></div>
        </button>
      </div>

    </form>

    <div class="footer-text">
      You can update your profile anytime from your dashboard.
    </div>

  </div>

</div>

<script>

// ============================================================
// GEOLOCATION VERIFICATION
// ============================================================
async function verifyLocationOnLoad() {
  try {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          await verifyRegionFromCoordinates(latitude, longitude);
        },
        (error) => {
          console.warn('Geolocation error:', error);
          getLocationFromIPForProfile();
        }
      );
    } else {
      getLocationFromIPForProfile();
    }
  } catch (err) {
    console.warn('Geolocation detection failed:', err);
    getLocationFromIPForProfile();
  }
}

async function verifyRegionFromCoordinates(lat, lng) {
  try {
    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    const data = await response.json();
    const countryCode = data.address?.country_code?.toUpperCase();
    updateLocationStatus(countryCode, 'success');
  } catch (err) {
    console.warn('Reverse geocoding failed:', err);
    getLocationFromIPForProfile();
  }
}

async function getLocationFromIPForProfile() {
  try {
    const response = await fetch('https://ipapi.co/json/');
    const data = await response.json();
    const countryCode = data.country_code?.toUpperCase();
    updateLocationStatus(countryCode, 'verified');
  } catch (err) {
    console.warn('IP lookup failed:', err);
    updateLocationStatus(null, 'error');
  }
}

function updateLocationStatus(countryCode, status) {
  const spinner = document.getElementById('locationSpinner');
  const icon = document.getElementById('locationIcon');
  const text = document.getElementById('locationText');
  const info = document.getElementById('locationInfo');
  
  spinner.style.display = 'none';
  
  if (status === 'success') {
    icon.className = 'bi bi-check-circle-fill';
    text.textContent = '✓ Location verified. Ready to proceed.';
    info.style.background = 'var(--green-light)';
  } else if (status === 'verified') {
    icon.className = 'bi bi-shield-check';
    text.textContent = '✓ Location verified via IP address.';
    info.style.background = 'var(--green-light)';
  } else {
    icon.className = 'bi bi-exclamation-circle';
    text.textContent = '⚠ Could not verify location. Contact support if needed.';
    info.style.background = '#FEF2F2';
  }
}

// ============================================================
// PHOTO UPLOAD HANDLER
// ============================================================
function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (file.size > 5 * 1024 * 1024) {
    showAlert('alertError', 'alertErrorText', 'Photo must be smaller than 5MB');
    return;
  }
  
  if (!['image/jpeg', 'image/png'].includes(file.type)) {
    showAlert('alertError', 'alertErrorText', 'Only JPG and PNG files are allowed');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('previewImg');
    const placeholder = document.querySelector('.photo-preview-placeholder');
    img.src = e.target.result;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ============================================================
// SKILL SELECTION
// ============================================================
document.querySelectorAll('.skill-tag input[type=checkbox]').forEach(checkbox => {
  checkbox.addEventListener('change', function() {
    this.parentElement.classList.toggle('selected');
  });
});

// ============================================================
// PROFILE SUBMISSION
// ============================================================
async function handleProfileSubmit(event) {
  event.preventDefault();
  
  const title = document.getElementById('title').value.trim();
  const experience = document.getElementById('experience').value;
  const hourlyRate = document.getElementById('hourlyRate').value.trim();
  const bio = document.getElementById('bio').value.trim();
  
  const selectedSkills = Array.from(document.querySelectorAll('.skill-tag input[type=checkbox]:checked'))
    .map(cb => cb.value);
  
  // Validation
  if (!title) {
    showAlert('alertError', 'alertErrorText', 'Please enter your professional title.');
    return;
  }
  
  if (!experience) {
    showAlert('alertError', 'alertErrorText', 'Please select your experience level.');
    return;
  }
  
  if (!hourlyRate || isNaN(hourlyRate) || parseFloat(hourlyRate) <= 0) {
    showAlert('alertError', 'alertErrorText', 'Please enter a valid hourly rate.');
    return;
  }
  
  if (bio.length < 20) {
    showAlert('alertError', 'alertErrorText', 'Please write at least 20 characters about yourself.');
    return;
  }
  
  if (selectedSkills.length === 0) {
    showAlert('alertError', 'alertErrorText', 'Please select at least one skill.');
    return;
  }
  
  // Set loading state
  setBtnLoading('submitBtn', 'submitSpinner', 'submitBtnText', true, 'Creating profile…');
  
  try {
    // Prepare profile data
    const profileData = {
      title,
      experience,
      hourlyRate: parseFloat(hourlyRate),
      bio,
      skills: selectedSkills,
      hasPhoto: !!document.getElementById('previewImg').src,
      completedAt: new Date().toISOString()
    };
    
    console.log('Profile data submitted:', profileData);
    
    // Simulate API submission
    await new Promise(resolve => setTimeout(resolve, 1500));
    
    showAlert('alertSuccess', 'alertSuccessText', 'Profile created successfully! Redirecting to dashboard...');
    
    setBtnLoading('submitBtn', 'submitSpinner', 'submitBtnText', false, 'Continue');
    
    // Redirect to dashboard
    setTimeout(() => {
      window.location.href = 'employee-dashboard.html';
    }, 2000);
    
  } catch (error) {
    setBtnLoading('submitBtn', 'submitSpinner', 'submitBtnText', false, 'Continue');
    showAlert('alertError', 'alertErrorText', error.message || 'Failed to create profile. Please try again.');
  }
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function showAlert(alertId, textId, message) {
  const alertEl = document.getElementById(alertId);
  const textEl = document.getElementById(textId);
  textEl.textContent = message;
  alertEl.classList.add('show');
  alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setBtnLoading(btnId, spinnerId, textId, loading, text) {
  const btn = document.getElementById(btnId);
  const spinner = document.getElementById(spinnerId);
  const textEl = document.getElementById(textId);
  
  btn.disabled = loading;
  spinner.style.display = loading ? 'inline-block' : 'none';
  if (text) textEl.textContent = text;
}

// ============================================================
// INITIALIZE
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  verifyLocationOnLoad();
});

</script>

</body>
</html>
